version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Santo_Domingo"
    open-pull-requests-limit: 8
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      security-patches:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Santo_Domingo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
