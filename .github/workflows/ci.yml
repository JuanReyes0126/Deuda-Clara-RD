name: CI

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: deuda_clara_rd
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deuda_clara_rd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      APP_URL: http://127.0.0.1:3000
      AUTH_SECRET: changeme-super-secret-key-with-32-chars
      CRON_SECRET: changeme-super-cron-secret
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/deuda_clara_rd?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/deuda_clara_rd?schema=public
      RESEND_API_KEY: ""
      RESEND_FROM_EMAIL: no-reply@deudaclarard.com
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
